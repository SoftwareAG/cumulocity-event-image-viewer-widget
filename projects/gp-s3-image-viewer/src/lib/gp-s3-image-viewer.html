    <div style ="float: right; margin-right: 10px;">
      <button type="button" class="btn btn-link c8y-realtime" title="Toggle realtime" (click)="toggle()" >
        <span [ngClass]="realtimeState?'c8y-pulse active' : 'c8y-pulse inactive'" ></span>
        <span >Realtime</span>
      </button>
      <button mat-icon-button style="float: right; margin-right: 10px;color:#1776BF;" type="button" class="button" (click) = "refresh()" ><span class="fa fa-refresh"></span></button>
      </div>
  </div>
 <div style="margin-left: 60px;">
  <mat-vertical-stepper [linear]="isLinear" #stepper (selectionChange)="stepperselectected($event)" [selectedIndex]="selectedIndex" >
    <ng-template matStepperIcon="edit">
      <mat-icon></mat-icon>
    </ng-template>
    
    <mat-step  *ngFor ="let event of evantData">    
       <ng-template matStepLabel>    <label class="label-time">{{event.creationTime | date:'d MMMM yyyy\n HH:mm'}}</label>    {{event.type}} </ng-template>
    
        <div class="details-div">
          <label class="heading-label">DETAILS</label>

          <div class="container-imageviewer">
            <div class="child"> 
           
              <dl>
                <dt>Time</dt>
                <dd>{{event.time}}</dd>
              </dl>
              <dl>
                <dt>Image Type</dt>
                <dd>{{event.type}}</dd>
              </dl>
              <dl>
                <dt>Device Name</dt>
                <dd>{{event.source.name}}</dd>
              </dl>
            </div>
            <div class="child">
              <img [src]="_DomSanitizationService.bypassSecurityTrustUrl(this.url)" class="stepper-img" (click)="openDialog(event.text)"  matTooltip="Click to zoom it">
            </div>
          </div>
          
        </div>

       
      </mat-step>
      
  
  </mat-vertical-stepper>
 </div>
