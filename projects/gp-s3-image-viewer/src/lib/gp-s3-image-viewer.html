      <mat-vertical-stepper [linear]="isLinear" #stepper (selectionChange)="stepperselectected($event)" [selectedIndex]="selectedIndex" >
        <ng-template matStepperIcon="edit">
          <mat-icon></mat-icon>
        </ng-template>
        
        <mat-step  *ngFor ="let i of [1,2,3,4]">    
           <ng-template matStepLabel>Event {{i}} </ng-template>
           
            <div class="details-div">
              <label class="heading-label">DETAILS</label>

              <div class="container">
                <div class="child"> 
               
                  <dl>
                    <dt>Time</dt>
                    <dd>3 Mar 2020 15:18:10</dd>
                  </dl>
                  <dl>
                    <dt>Image Type</dt>
                    <dd>Good</dd>
                  </dl>
                  <dl>
                    <dt>Device Name</dt>
                    <dd>Cam_1223</dd>
                  </dl>
                </div>
                <div class="child">
                  <img [src]="getImage(i)" class="stepper-img" (click)="openDialog()"  matTooltip="Click to zoom it">
                </div>
              </div>
              
            </div>

           
          </mat-step>
          
        <mat-step>
          <ng-template matStepLabel>Done</ng-template>
          You are now done.
          <div>
            <button mat-button matStepperPrevious>Back</button>
            <button mat-button (click)="stepper.reset()">Reset</button>
          </div>
        </mat-step>
      </mat-vertical-stepper>
